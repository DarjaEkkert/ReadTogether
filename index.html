<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ReadTogetehr</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">

    <div id="sidebar" style="display:none;">

    <div id="profileSection">

        <div id="avatar">
            👤
        </div>

        <h3 id="profileName">
            Gast
        </h3>

        <p id="booksRead">
            Gelesene Bücher 2026: 0
        </p>

    </div>

    <div id="sidebarBottom">

        <button id="logoutBtn"
                onclick="logoutUser()"
                style="display:none;">
            Logout
        </button>

    </div>

</div>
    <div id="mainContent">
          <h1>ReadTogetehr</h1>
          <p class="subtitle">We need more books</p>

          <div id="welcomeMessage"> Ich freue mich, dass du da bist!
          </div>
    
 


  <div id="authSection">

    <div id="loginArea">

        <input id="email" type="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

<button id="registerBtn" onclick="registerUser()">
    Registrieren
</button>

<button id="loginBtn" onclick="loginUser()">
    Login
</button>



          <button
           id="logoutBtn"
           onclick="logoutUser()"
            style="display:none;">
          Logout
        </button>

    <span id="currentUser"></span>

</div>

</div>

  <div id="bookSection" style="display:none;">
  <h2>📚 My Book List</h2>

  <div class="form">
    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input type="file" id="coverFile" accept="image/*">
    <textarea id="review" placeholder="Your personal review"></textarea>

    <select id="rating">
      <option value="0">0</option>
      <option value="1">1 ⭐</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐</option>
      <option value="4">4 ⭐</option>
      <option value="5">5 ⭐</option>
    </select>

    <button onclick="addBook()">Add Book</button>
  </div>

  <div id="list"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/books.js"></script>
<script src="js/app.js"></script>

<script src="js/users.js"></script>

</body>
</html>
