<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ReadTogetehr</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">

    <div id="sidebar" style="display:none;">

    <div id="sidebarProfile">

        <img id="avatarImage"
            src="avatars/avatar1.png"
            alt="Avatar">

        <h3 id="profileName">Gast</h3>
        <div id="userRole"></div>

        <p id="booksRead"> Gelesene Bücher 2026: 0 </p>

        <button id="adminBtn"
            onclick="showAdmin()"
            style="display:none;">
                Administration
        </button>

    </div>

    <div id="sidebarBottom">
                     <button id="profileBtn" onclick="showProfile()"  style="display:none;">
                    My Profile
                     </button>

        <button id="logoutBtn"
                onclick="logoutUser()"
                style="display:none;">
            Logout
        </button>

    </div>

</div>
    <div id="mainContent">
          <h1>ReadTogether</h1>
          <p class="subtitle">We need more books</p>

          <div id="welcomeMessage"> Lass uns lesen!</div>

  <div id="authSection">

    <div id="loginArea">

        <input id="email" type="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

<button id="registerBtn" onclick="registerUser()">
    Registrieren
</button>

<button id="loginBtn" onclick="loginUser()">
    Login

    
</button>



    <span id="currentUser"></span>
<div id="coverSlider">

<img id="sliderImage"
     src="https://eagoxqxrokoadzmgpjiv.supabase.co/storage/v1/object/public/covers/cover-1780059161587.png"
     alt="Book Cover">

</div>


</div>

<div id="profileSection" class="view" style="display:none;">

    <h2>My Profile</h2>

    <div>
    <label>Avatar</label><br>

        <div id="avatarSelection"></div>
</div>

<br>

    <div>
        <label>Name</label><br>
        <input type="text" id="profileUsername">
    </div>

    <br>

    <div>
        <label>Geburtstag</label><br>
        <input type="date" id="profileBirthday">
    </div>

    <br>

    <button id="saveProfileBtn"
        onclick="saveProfile()">
    Speichern
    </button>

    <div id="saveMessage"></div>

    <button onclick="closeProfile()">
            Zurück zur meine Bücher
    </button>

    

</div>

<div id="adminSection" class="view" style="display:none;">

    <h2>Administration</h2>

    <div id="adminPanel" class="form">

        <h3>Neue Leserunde</h3>

        <div id="readingRoundForm" class="form">

            <input
                type="number"
                id="roundYear"
                placeholder="Jahr">

            <input
                type="number"
                id="roundNumber"
                placeholder="Rundennummer">

            <input
                type="text"
                id="roundTheme"
                placeholder="Thema">

            <input
                type="date"
                id="roundEndDate">

            <div class="checkbox-row">

                <input
                    type="checkbox"
                    id="roundActive">

                <label for="roundActive">
                    Aktive Leserunde
                </label>

            </div>

            <button onclick="saveReadingRound()">
                Leserunde speichern
            </button>

            <div id="roundSaveMessage"></div>

        </div>

        <h3>Neues Buch</h3>

        <div id="adminBookForm" class="form">

            <input id="title" placeholder="Title">

            <input id="author" placeholder="Author">

            <input
                type="file"
                id="coverFile"
                accept="image/*">

            <label for="readingRoundSelect">
                Leserunde
            </label>

            <select id="readingRoundSelect"></select>

            <button onclick="addBook()">
                Add Book
            </button>

        </div>

        <button onclick="closeAdmin()">
            Zurück zu meinen Büchern
        </button>

    </div>

</div>

  <div id="bookSection" class="view" style="display:none;">
  <h2>Aktuelle Leserunde</h2>
  
  <div id="currentReadingRoundInfo"></div>


  <div id="reviewsaveMessage"></div>
  <div id="list"></div>
    </div>

<div id="librarySection" class="view">

    <h2>Bibliothek</h2>

    <div id="libraryList"></div>

</div>
</div>
</div>

<!--Verbindungen zur andere klassen-->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/books.js"></script>
<script src="js/reviews.js"></script>
<script src="js/ratings.js"></script>
<script src="js/app.js"></script>
<script src="js/views.js"></script>
<script src="js/users.js"></script>
<script src="js/slider.js"></script>


</body>
</html>
