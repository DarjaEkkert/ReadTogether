<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ReadTogetehr</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">

    <div id="sidebar" style="display:none;">

    <div id="sidebarProfile">

        <img id="avatarImage"
            src="avatars/avatar1.png"
            alt="Avatar">

        <h3 id="profileName">Gast</h3>
        <div id="userRole"></div>

        <p id="booksRead"> Gelesene Bücher 2026: 0 </p>

    </div>

    <div id="sidebarBottom">
                     <button id="profileBtn" onclick="showProfile()"  style="display:none;">
                    My Profile
                     </button>
        <button id="logoutBtn"
                onclick="logoutUser()"
                style="display:none;">
            Logout
        </button>

    </div>

</div>
    <div id="mainContent">
          <h1>ReadTogetehr</h1>
          <p class="subtitle">We need more books</p>

          <div id="welcomeMessage"> Lass uns lesen!</div>

  <div id="authSection">

    <div id="loginArea">

        <input id="email" type="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

<button id="registerBtn" onclick="registerUser()">
    Registrieren
</button>

<button id="loginBtn" onclick="loginUser()">
    Login

    
</button>



    <span id="currentUser"></span>
<div id="coverSlider">

<img id="sliderImage"
     src="https://eagoxqxrokoadzmgpjiv.supabase.co/storage/v1/object/public/covers/cover-1780059161587.png"
     alt="Book Cover">

</div>


</div>

<div id="profileSection" style="display:none;">

    <h2>My Profile</h2>

    <div>
    <label>Avatar</label><br>

    <select id="profileAvatar">
        <option value="avatar1">Avatar 1</option>
        <option value="avatar2">Avatar 2</option>
        <option value="avatar3">Avatar 3</option>
        <option value="avatar4">Avatar 4</option>
        <option value="avatar5">Avatar 5</option>
    </select>
</div>

<br>

    <div>
        <label>Name</label><br>
        <input type="text" id="profileUsername">
    </div>

    <br>

    <div>
        <label>Geburtstag</label><br>
        <input type="date" id="profileBirthday">
    </div>

    <br>

    <button id="saveProfileBtn"
        onclick="saveProfile()">
    Speichern
    </button>

    <div id="saveMessage"></div>

    <button onclick="closeProfile()">
            Zurück zur meine Bücher
    </button>

    

</div>

<div id="adminPanel" style="display:none;">

    <h2>Admin Bereich</h2>

    <p>
        Du kannst Bücher für den Buchclub verwalten.
    </p>

</div>

  <div id="bookSection" style="display:none;">
  <h2>📚 Aktuelle Leserunde</h2>
  

  <div id="adminBookForm" class="form">
    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input type="file" id="coverFile" accept="image/*">
    <input type="date" id="readingDeadline">

    <button onclick="addBook()">Add Book</button>
  </div>
  <div id="reviewsaveMessage"></div>
  <div id="list"></div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/books.js"></script>
<script src="js/reviews.js"></script>
<script src="js/ratings.js"></script>
<script src="js/app.js"></script>

<script src="js/users.js"></script>
<script src="js/slider.js"></script>

</body>
</html>
